name: Build and Deploy to Azure

# 触发条件：当 main 分支有代码 push 时触发自动化流程
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出 GitHub 仓库中的最新代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Docker Buildx（利用缓存机制大幅加速打包速度）
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. 登录到你的 Azure ACR 私有镜像仓库
    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 4. 构建 Docker 镜像并将其推送到 Azure ACR 私有仓库
    - name: Build and push image to ACR
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # 同时打上两个标签：一个是通用的latest，一个是当前提交唯一的 Commit 哈希值
        tags: |
          ${{ secrets.ACR_LOGIN_SERVER }}/tanchishe:latest
          ${{ secrets.ACR_LOGIN_SERVER }}/tanchishe:${{ github.sha }}

    # 5. 使用之前生成的 JSON 凭据登录 Azure 平台
    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 6. 命令 Azure Container Apps (ACA) 容器应用拉取新镜像并完成滚动更新
    - name: Deploy to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        acrName: ${{ secrets.ACR_USERNAME }}
        resourceGroup: tanchishe
        containerAppName: tanchishe
        imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/tanchishe:${{ github.sha }}